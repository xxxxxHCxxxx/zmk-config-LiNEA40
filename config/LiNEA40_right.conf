# Broadcast LiNEA40 status for ZMKWindow and Prospector-compatible scanners.
CONFIG_ZMK_STATUS_ADVERTISEMENT=y
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="LiNEA40"

# LiNEA40 uses the right half as the central device.
CONFIG_ZMK_STATUS_ADV_CENTRAL_SIDE="RIGHT"
CONFIG_PROSPECTOR_EXPECTED_PERIPHERAL_COUNT=1
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Keep active updates within the ZMKWindow 200 ms response target.
CONFIG_ZMK_STATUS_ADV_ACTIVITY_BASED=y
CONFIG_ZMK_STATUS_ADV_ACTIVE_INTERVAL_MS=100
CONFIG_ZMK_STATUS_ADV_IDLE_INTERVAL_MS=30000
